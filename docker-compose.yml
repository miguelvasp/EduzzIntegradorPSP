services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eduzz-integrador-db
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'Eduzz@12345'
      MSSQL_PID: 'Developer'
    ports:
      - '1433:1433'
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'Eduzz@12345' -Q 'SELECT 1' || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  db-bootstrap:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eduzz-integrador-db-bootstrap
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c']
    command:
      - >
        /opt/mssql-tools18/bin/sqlcmd -C -S db -U sa -P 'Eduzz@12345'
        -Q "IF DB_ID(N'EduzzMultiPsp') IS NULL BEGIN CREATE DATABASE EduzzMultiPsp; END;"

  mock-server:
    image: node:22-alpine
    container_name: eduzz-integrador-mock-server
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npx tsx src/mock-server/index.ts"
    environment:
      MOCK_SERVER_HOST: 0.0.0.0
      MOCK_SERVER_PORT: 3334
    ports:
      - '3334:3334'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- "http://localhost:3334/core/v5/orders?page=1&size=1" >/dev/null 2>&1 || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    image: node:22-alpine
    container_name: eduzz-integrador-app
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npx tsx src/app/server/index.ts"
    environment:
      APP_NAME: eduzz-integrador-psp
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: info
      DOCS_ENABLED: 'true'

      DATABASE_HOST: db
      DATABASE_PORT: 1433
      DATABASE_NAME: EduzzMultiPsp
      DATABASE_USER: sa
      DATABASE_PASSWORD: Eduzz@12345
      DATABASE_CONNECTION_TIMEOUT_MS: 5000
      DATABASE_POOL_MIN: 1
      DATABASE_POOL_MAX: 10
      DATABASE_ENCRYPT: 'false'
      DATABASE_TRUST_SERVER_CERTIFICATE: 'true'

      PSP_USE_MOCK_SERVER: 'true'
      PSP_TIMEOUT_MS: 10000
      PSP_RETRY_ATTEMPTS: 2

      PAGARME_BASE_URL: http://mock-server:3334
      PAGARME_API_KEY: mock-api-key

      MERCADOPAGO_BASE_URL: http://mock-server:3334
      MERCADOPAGO_ACCESS_TOKEN: mock-access-token

      SYNC_PAGE_SIZE: 20
      SYNC_MAX_PAGE_SIZE: 100
      SYNC_INCREMENTAL_WINDOW_MINUTES: 60
      SYNC_SAFETY_OVERLAP_MINUTES: 5

      SECURITY_HASH_SALT: mock-salt
      SECURITY_MASK_SENSITIVE_DATA: 'true'
      SECURITY_REDACT_SECRETS_IN_LOGS: 'true'

      OBS_STRUCTURED_LOGGING: 'true'
      OBS_METRICS_ENABLED: 'false'
      OBS_REQUEST_CORRELATION_ENABLED: 'true'

      CACHE_ENABLED: 'false'
      CACHE_TTL_SECONDS: 60

      OUTBOX_DISPATCHER_ENABLED: 'false'
      OUTBOX_BATCH_SIZE: 50
      OUTBOX_POLL_INTERVAL_MS: 5000
      OUTBOX_RETRY_LIMIT: 3
    ports:
      - '3000:3000'
    depends_on:
      db-bootstrap:
        condition: service_completed_successfully
      mock-server:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- "http://localhost:3000/health" >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  sqlserver-data:
